name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.package }} (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Release + 태그 생성
      id-token: write   # npm provenance (OIDC 서명)
    strategy:
      fail-fast: false
      matrix:
        package: [cli, mcp-server]
        node: [22]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
          registry-url: https://registry.npmjs.org

      # `npm install` (not `npm ci`): @emnapi/* are optional deps of
      # platform-specific native packages (rolldown/oxc), and npm omits the
      # Linux variants from a Windows-generated lockfile — `npm ci` then fails
      # the strict sync check. `npm install` reconciles per-platform.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # main 푸시에서 package.json version 이 npm 에 아직 없으면 자동 publish.
      # 버전이 그대로면 skip (idempotent) — 수동 `npm version patch` 후 푸시만 하면 배포됨.
      # NPM_TOKEN secret 미설정 시 안전하게 skip (실패 아님).
      - name: Publish if version is new
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret 미설정 — publish 건너뜀 (repo Settings → Secrets → NPM_TOKEN 추가 필요)"
            exit 0
          fi
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          # 빠른 경로: 이미 있으면 publish 시도 자체를 생략 (--prefer-online 으로 캐시 우회)
          if npm view "$NAME@$VERSION" version --prefer-online >/dev/null 2>&1; then
            echo "• $NAME@$VERSION 이미 npm 에 존재 — skip"
            exit 0
          fi
          echo "→ publishing $NAME@$VERSION"
          # 레이스 안전망: 방금 다른 푸시가 같은 버전을 올려 pre-check 가 stale 이어도
          # 레지스트리의 "이미 존재" 거부(403)는 실패가 아니라 no-op 으로 처리.
          # 그 외 에러(권한/네트워크 등)는 그대로 실패시킨다.
          if npm publish --access public --provenance 2>/tmp/pub.err; then
            cat /tmp/pub.err >&2 || true
            echo "✓ published $NAME@$VERSION (provenance 서명됨)"
            # 새 버전 publish 성공 시 GitHub Release 자동 생성 (자동 release notes).
            # 실패해도 publish 는 이미 끝났으므로 비치명적 처리.
            TAG="${{ matrix.package }}-v$VERSION"
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$NAME $VERSION" --generate-notes \
              || echo "⚠ GitHub Release 생성 실패 (publish 는 성공) — 무시"
          elif grep -qiE "cannot publish over|previously published" /tmp/pub.err; then
            cat /tmp/pub.err >&2
            echo "• $NAME@$VERSION 이미 존재(레이스) — no-op"
          else
            cat /tmp/pub.err >&2
            exit 1
          fi
