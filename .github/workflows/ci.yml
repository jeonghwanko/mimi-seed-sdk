name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# 같은 ref 의 run 을 직렬화 — 연속 푸시 2건이 같은 패키지를 동시에 publish 하다
# npm 409 packument 경합으로 죽은 실사고(2026-07-09)의 재발 방지.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    name: ${{ matrix.package }} (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Release + 태그 생성
      id-token: write   # npm provenance (OIDC 서명)
    strategy:
      fail-fast: false
      matrix:
        package: [cli, mcp-server]
        node: [22]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
          registry-url: https://registry.npmjs.org

      # `npm install` (not `npm ci`): @emnapi/* are optional deps of
      # platform-specific native packages (rolldown/oxc), and npm omits the
      # Linux variants from a Windows-generated lockfile — `npm ci` then fails
      # the strict sync check. `npm install` reconciles per-platform.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # main 푸시에서 package.json version 이 npm 에 아직 없으면 자동 publish.
      # 버전이 그대로면 skip (idempotent) — 수동 `npm version patch` 후 푸시만 하면 배포됨.
      # NPM_TOKEN secret 미설정 시 안전하게 skip (실패 아님).
      - name: Publish if version is new
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret 미설정 — publish 건너뜀 (repo Settings → Secrets → NPM_TOKEN 추가 필요)"
            exit 0
          fi
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          # 빠른 경로: 이미 있으면 publish 시도 자체를 생략 (--prefer-online 으로 캐시 우회)
          if npm view "$NAME@$VERSION" version --prefer-online >/dev/null 2>&1; then
            echo "• $NAME@$VERSION 이미 npm 에 존재 — skip"
            exit 0
          fi
          # publish 는 최대 3회 시도. 실패 판정은 에러 메시지 문자열 grep 이 아니라
          # "레지스트리에 실제로 올라갔는가"(npm view 재확인)로 한다 — 409 packument
          # 경합("Failed to save packument"), OIDC 일시 오류(IDENTITY_TOKEN_READ_ERROR),
          # 어느 쪽이든 메시지 포맷과 무관하게 안전. (둘 다 2026-07 실사고.)
          for attempt in 1 2 3; do
            echo "→ publishing $NAME@$VERSION (attempt $attempt)"
            if npm publish --access public --provenance; then
              echo "✓ published $NAME@$VERSION (provenance 서명됨)"
              # 새 버전 publish 성공 시 GitHub Release 자동 생성 (자동 release notes).
              # 실패해도 publish 는 이미 끝났으므로 비치명적 처리.
              TAG="${{ matrix.package }}-v$VERSION"
              gh release create "$TAG" --target "$GITHUB_SHA" --title "$NAME $VERSION" --generate-notes \
                || echo "⚠ GitHub Release 생성 실패 (publish 는 성공) — 무시"
              exit 0
            fi
            sleep 15
            if npm view "$NAME@$VERSION" version --prefer-online >/dev/null 2>&1; then
              echo "• $NAME@$VERSION 레지스트리에 이미 존재 (경합/부분 성공) — publish no-op"
              # 부분 성공(publish 는 됐는데 응답만 실패) 케이스에도 Release 는 남긴다.
              # 이미 존재하면 gh 가 실패하고 || 가드가 삼킨다.
              TAG="${{ matrix.package }}-v$VERSION"
              gh release create "$TAG" --target "$GITHUB_SHA" --title "$NAME $VERSION" --generate-notes \
                || echo "⚠ GitHub Release 생성 실패/이미 존재 — 무시"
              exit 0
            fi
          done
          echo "❌ $NAME@$VERSION publish 3회 실패"
          exit 1
